name: CI/CD Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux Package (.deb)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          cache: 'true'

      - name: Install Compiler and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgl1-mesa-dev libxkbcommon-dev libx11-xcb-dev libglu1-mesa-dev

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Application
        run: cmake --build build

      - name: Package as .deb
        run: |
          mkdir -p debian/usr/bin
          cp build/graber debian/usr/bin/
          
          mkdir -p debian/usr/share/applications
          cat << 'EOF' > debian/usr/share/applications/graber.desktop
          [Desktop Entry]
          Type=Application
          Name=Clipboard Graber
          Comment=Clipboard note capturing and markdown utility
          Exec=graber
          Icon=graber
          Terminal=false
          Categories=Utility;Office;
          EOF
          
          mkdir -p debian/DEBIAN
          cat << 'EOF' > debian/DEBIAN/control
          Package: graber
          Version: 1.0.0
          Architecture: amd64
          Maintainer: Graber Developer <graber@example.com>
          Depends: libc6, libqt6core6, libqt6gui6, libqt6widgets6, libstdc++6
          Description: Clipboard Graber GUI application to capture clipboard content and manage markdown notes.
          EOF
          
          dpkg-deb --build debian graber.deb

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: graber-linux-deb
          path: graber.deb
          compression-level: 0

  build-windows:
    name: Build Windows Package
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          cache: 'true'

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Application
        run: cmake --build build --config Release

      - name: Prepare Raw EXE and Bundled ZIP
        shell: pwsh
        run: |
          mkdir dist
          # Copy the raw exe out to the root directory for a standalone upload
          copy build/Release/graber.exe ./graber.exe
          
          # Copy the exe into the dist directory to bundle it with its DLL dependencies
          copy build/Release/graber.exe dist/
          windeployqt --dir dist dist/graber.exe
          Compress-Archive -Path dist\* -DestinationPath graber-windows.zip

      - name: Upload Raw EXE
        uses: actions/upload-artifact@v4
        with:
          name: graber-windows-exe
          path: graber.exe
          compression-level: 0

      - name: Upload Bundled ZIP
        uses: actions/upload-artifact@v4
        with:
          name: graber-windows-zip
          path: graber-windows.zip
          compression-level: 0

  build-macos:
    name: Build macOS Disk Image (.dmg)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          cache: 'true'

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        env:
          LDFLAGS: "-Wl,-weak_framework,AGL"

      - name: Build Application
        run: cmake --build build --config Release
        env:
          LDFLAGS: "-Wl,-weak_framework,AGL"

      - name: Bundle with macdeployqt
        run: |
          macdeployqt build/graber.app -dmg
          mv build/graber.dmg graber-macos.dmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: graber-macos-dmg
          path: graber-macos.dmg
          compression-level: 0

  build-freebsd:
    name: Build FreeBSD Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y cmake qt6-base
          run: |
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
            cmake --build build
            cp build/graber graber-freebsd

      - name: Upload FreeBSD Artifact
        uses: actions/upload-artifact@v4
        with:
          name: graber-freebsd-bin
          path: graber-freebsd
          compression-level: 0

  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos, build-freebsd]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            graber-linux-deb/graber.deb
            graber-windows-exe/graber.exe
            graber-windows-zip/graber-windows.zip
            graber-macos-dmg/graber-macos.dmg
            graber-freebsd-bin/graber-freebsd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
